<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Furniture Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Furniture Calculator</h1>

<div class="container">

<h2>Cabinet Dimensions</h2>

<label>Height (mm)</label>
<input type="number" id="height">

<label>Width (mm)</label>
<input type="number" id="width">

<label>Depth (mm)</label>
<input type="number" id="depth">

<label>Sheet Thickness (mm)</label>
<input type="number" id="thickness" value="18">

<button onclick="generateCutList()">Generate Cut List</button>

</div>


<div class="container">

<h2>Compartments</h2>

<label>Shelves</label>
<input type="number" id="shelves" value="0">

<label>Drawers</label>
<input type="number" id="drawers" value="0">

</div>


<div class="container">

<h2>Material Cost</h2>

<label>Plywood Price / sq ft</label>
<input type="number" id="plyPrice">

<label>Mica Price / sq ft</label>
<input type="number" id="micaPrice">

<button onclick="calculateCost()">Calculate Material</button>

<pre id="cost"></pre>

</div>


<div class="container">

<h2>Hardware Cost</h2>

<label>Hinge Price</label>
<input type="number" id="hingePrice">

<label>Handle Price</label>
<input type="number" id="handlePrice">

<label>Channel Price</label>
<input type="number" id="channelPrice">

<button onclick="calculateHardware()">Calculate Hardware</button>

<pre id="hardware"></pre>

</div>


<div class="container">

<h2>Cut List</h2>

<pre id="cutlist"></pre>

</div>


<div class="container">

<h2>Sheet Cutting Layout</h2>

<canvas id="sheetCanvas" width="700" height="350"></canvas>

<button onclick="generateLayout()">Generate Sheet Layout</button>

</div>


<div class="container">

<h2>Quotation</h2>

<button onclick="generateQuotation()">Generate Quotation</button>

<pre id="quotation"></pre>

</div>


<script src="script.js"></script>

</body>
</html>
