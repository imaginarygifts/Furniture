<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Furniture Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Furniture Calculator</h1>

<!-- PROJECT -->
<div class="container">

<h2>Create Project</h2>

<label>Client Name</label>
<input type="text" id="clientName">

<label>Project Name</label>
<input type="text" id="projectName">

<button onclick="createProject()">Create Project</button>

</div>


<!-- CABINET INPUT -->
<div class="container">

<h2>Cabinet Details</h2>

<label>Height (mm)</label>
<input type="number" id="height">

<label>Width (mm)</label>
<input type="number" id="width">

<label>Depth (mm)</label>
<input type="number" id="depth">

<label>Sheet Thickness (mm)</label>
<input type="number" id="thickness" value="18">

<label>Mica Thickness (mm)</label>
<input type="number" id="micaThickness" value="1">

<label>Quantity</label>
<input type="number" id="qty" value="1">

</div>


<!-- COMPARTMENTS -->
<div class="container">

<h2>Compartments</h2>

<label>Shelves</label>
<input type="number" id="shelves" value="0">

<label>Drawers</label>
<input type="number" id="drawers" value="0">

</div>


<!-- MATERIAL -->
<div class="container">

<h2>Material</h2>

<label>Plywood Price (per sheet)</label>
<input type="number" id="plyPrice">

<label>Mica Price (per sheet)</label>
<input type="number" id="micaPrice">

<pre id="cost"></pre>

</div>


<!-- HARDWARE -->
<div class="container">

<h2>Hardware</h2>

<label>Hinge Price</label>
<input type="number" id="hingePrice">

<label>Handle Price</label>
<input type="number" id="handlePrice">

<label>Channel Price</label>
<input type="number" id="channelPrice">

<pre id="hardware"></pre>

</div>


<!-- SINGLE BUTTON -->
<div class="container" style="text-align:center">

<button onclick="calculateAll()" style="font-size:18px;padding:15px 40px;">
Calculate
</button>

</div>


<!-- CUT LIST -->
<div class="container">

<h2>Cut List</h2>

<pre id="cutlist"></pre>

<button onclick="addCabinet()">Add Cabinet To Project</button>

</div>


<!-- SHEET LAYOUT -->
<div class="container">

<h2>Sheet Cutting Layout</h2>

<canvas id="sheetCanvas" width="700" height="350"></canvas>

<div style="margin-top:10px;">
<button onclick="prevSheet()">Previous</button>
<button onclick="nextSheet()">Next</button>
</div>

</div>


<!-- PROJECT -->
<div class="container">

<h2>Project Cabinets</h2>

<pre id="projectList"></pre>

<button onclick="generateProjectQuotation()">Generate Project Quotation</button>

<pre id="projectQuotation"></pre>

</div>


<script src="script.js"></script>

</body>
</html>
